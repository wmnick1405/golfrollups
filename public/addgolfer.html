<!DOCTYPE html>
<html>
<div id="nav-placeholder"></div>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Add Golfer</title>

<style>

body{
font-family:Arial;
background:#f2f2f2;
padding:30px;
}

.container{
max-width:550px;
margin:auto;
background:white;
padding:25px;
border-radius:8px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

h2{
text-align:center;
}

label{
display:block;
margin-top:10px;
font-weight:bold;
}

input{
width:100%;
padding:10px;
margin-top:5px;
border:1px solid #ccc;
border-radius:5px;
}

.days{
margin-top:10px;
}

.days label{
font-weight:normal;
}

button{
margin-top:20px;
padding:10px;
width:100%;
background:#1976d2;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

ul{
margin-top:20px;
}

</style>

</head>

<body>

<div class="container">

<h2>Add Golfer</h2>

<form id="golferForm">

<label>Name *</label>
<input id="name" required>

<label>Telephone</label>
<input id="phone">

<label>Email</label>
<input id="email">

<label>Preferred Playing Days</label>

<div class="days">

<label><input type="checkbox" value="Monday"> Monday</label>
<label><input type="checkbox" value="Wednesday"> Wednesday</label>
<label><input type="checkbox" value="Friday"> Friday</label>

</div>

<button type="submit">Add Golfer</button>

</form>

<h3>Current Golfers & preferred playing days</h3>

<ul id="golferList"></ul>

</div>

<script>

async function loadGolfers(){

const response = await fetch('/api/golfers')
const golfers = await response.json()

const list=document.getElementById('golferList')
list.innerHTML=""

golfers.forEach(g=>{

const li=document.createElement('li')

const days = g.play_days ? g.play_days.join(", ") : ""

li.textContent = g.name + " (" + days + ")"

list.appendChild(li)

})

}

document.getElementById('golferForm').addEventListener('submit', async function(e){

e.preventDefault()

const name=document.getElementById('name').value
const phone=document.getElementById('phone').value
const email=document.getElementById('email').value

const checkboxes=document.querySelectorAll('.days input:checked')

const play_days=[]

checkboxes.forEach(cb=>{
play_days.push(cb.value)
})

await fetch('/api/golfers',{

method:'POST',

headers:{'Content-Type':'application/json'},

body:JSON.stringify({

name:name,
phone:phone,
email:email,
play_days:play_days

})

})

document.getElementById('golferForm').reset()

loadGolfers()

})

loadGolfers()

fetch('nav.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById('nav-placeholder').innerHTML = data;
            });

</script>

</body>
</html>
