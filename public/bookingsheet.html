<!DOCTYPE html>
<html>
<head>
    <title>Booking Sheet</title>
    <style>
        body { font-family: Arial; padding: 30px; }
        .group { margin-top: 20px; padding: 10px; background: #f8f8f8; border-radius: 5px; border: 1px solid #ddd; }
        .group b { color: #2e7d32; }
        .comp-header { font-size: 1.2em; font-weight: bold; margin-bottom: 10px; color: #333; }
    </style>
</head>
<body>

    <div id="nav-placeholder"></div>

    <h2>Booking Sheet</h2>
    <div id="sheet"></div>

    <script src="js/shared.js"></script>

    <script>
        async function loadBookingSheet() {
            const params = new URLSearchParams(window.location.search);
            const rollupId = params.get("id");
            if (!rollupId) {
                document.getElementById("sheet").innerHTML = "<p>No rollup selected</p>";
                return;
            }

            try {
                const response = await fetch(`/api/rollups/${rollupId}`);
                if (!response.ok) throw new Error("Rollup not found");
                const rollup = await response.json();

                const div = document.getElementById("sheet");
                
                // --- NEW HEADER LOGIC ---
                // We use the 'competition' field from the database, defaulting to 'Social'
                const compName = rollup.competition || "Social";
                const dateStr = new Date(rollup.date).toDateString();

                div.innerHTML = `
                    <h3>${dateStr}</h3>
                    <div class="comp-header">Competition: ${compName}</div>
                    <hr>
                `;

                rollup.groups.forEach((group, i) => {
                    const gdiv = document.createElement("div");
                    gdiv.className = "group";

                    let html = `<b>Group ${i + 1}</b><br>`;
                    group.forEach(p => {
                        // Bold the name and add label if they are the booker
                        html += p.booker ? `<b>${p.name} (Booker)</b><br>` : `${p.name}<br>`;
                    });

                    gdiv.innerHTML = html;
                    div.appendChild(gdiv);
                });
            } catch (err) {
                console.error(err);
                document.getElementById("sheet").innerHTML = "<p>Error loading rollup</p>";
            }
        }

        loadBookingSheet();
    </script>

</body>
</html>
