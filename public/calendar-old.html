<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Rollup Calendar</title>

<style>

body{
font-family:Arial;
background:#f2f2f2;
padding:30px;
}

.container{
max-width:700px;
margin:auto;
background:white;
padding:25px;
border-radius:8px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.row{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px;
border-bottom:1px solid #ddd;
}

button{
padding:8px 14px;
background:#2e7d32;
color:white;
border:none;
border-radius:5px;
}

button:hover{
background:#1b5e20;
}

.group{
margin-top:15px;
padding:10px;
background:#f8f8f8;
border-radius:5px;
}

</style>

</head>

<body>

<div class="container">

<h2>Upcoming Rollups</h2>

<div id="dates"></div>

<div id="groups"></div>

</div>

<script>

function getNextRollupDates(){

const result=[]
const today=new Date()

for(let i=0;i<21;i++){

let d=new Date()
d.setDate(today.getDate()+i)

let day=d.getDay()

if(day===1 || day===3 || day===5){

result.push(new Date(d))

}

}

return result.slice(0,6)

}

function formatDate(date){

return date.toISOString().split('T')[0]

}

function displayDates(){

const dates=getNextRollupDates()

const div=document.getElementById("dates")

dates.forEach(d=>{

let row=document.createElement("div")
row.className="row"

let label=document.createElement("div")
label.innerHTML=d.toDateString()

let btn=document.createElement("button")
btn.innerHTML="Generate"
btn.onclick=()=>generate(formatDate(d))

row.appendChild(label)
row.appendChild(btn)

div.appendChild(row)

})

}

function shuffle(array){

for(let i=array.length-1;i>0;i--){

let j=Math.floor(Math.random()*(i+1))

let temp=array[i]
array[i]=array[j]
array[j]=temp

}

return array

}

function buildGroups(players){

let groups=[]

while(players.length>0){

if(players.length===4){

groups.push(players.splice(0,4))

}

else if(players.length===5){

groups.push(players.splice(0,3))
groups.push(players.splice(0,2))

}

else{

groups.push(players.splice(0,3))

}

}

return groups

}

async function generate(date){

const response=await fetch(`/api/available?date=${date}`)

const players=await response.json()

shuffle(players)

const groups=buildGroups(players)

const div=document.getElementById("groups")

div.innerHTML="<h3>"+date+"</h3>"

groups.forEach((group,i)=>{

let g=document.createElement("div")

g.className="group"

let html="<b>Group "+(i+1)+"</b><br>"

group.forEach(p=>{

html+=p.name+"<br>"

})

g.innerHTML=html

div.appendChild(g)

})

}

displayDates()

</script>

</body>

</html>
