<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Table Generator</title>
    <style>
        body {
            font-family: Arial;
            margin: 30px;
        }

        .controls {
            background: #f4f4f4;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #ddd;
        }

        select {
            padding: 8px;
            margin-right: 10px;
        }

        #previewArea {
            margin-top: 30px;
            padding: 20px;
            border: 2px dashed #2e7d32;
            border-radius: 8px;
            background-color: white;
        }

        .btn-generate {
            background: #2e7d32;
            color: white;
            padding: 10px 20px;
            border: none;
            cursor: pointer;
            border-radius: 4px;
        }

        .btn-select {
            background: #1565c0;
            color: white;
            padding: 10px 20px;
            border: none;
            cursor: pointer;
            border-radius: 4px;
            margin-top: 10px;
        }

        .hidden {
            display: none;
        }
    </style>
</head>

<body>
     <div id="nav-placeholder"></div>

    <div class="controls">
        <h3>Step 1: Select up to 3 Dates</h3>
        <div style="display: flex; gap: 10px;">
            <select id="date1">
                <option value="">-- Select Date 1 --</option>
            </select>
            <select id="date2">
                <option value="">-- Select Date 2 --</option>
            </select>
            <select id="date3">
                <option value="">-- Select Date 3 --</option>
            </select>
        </div>
        <button class="btn-generate" onclick="buildMultiColumnTable()">Step 2: Generate Table Below</button>
    </div>

    <div id="previewArea">
        <p style="color: #666;">Your generated table will appear here. You can then highlight and copy it directly into
            your email.</p>
    </div>

    <button id="selectBtn" class="btn-select hidden" onclick="selectElementContents()">Click to Highlight Table for
        Copying</button>

    <!-- Load the navigation bar from nav.html -->
    <script src="js/shared.js"></script>
    
    <script>
        window.onload = loadRollupHistory;

        async function loadRollupHistory() {
            try {
                const res = await fetch('/api/rollups?limit=20');
                const history = await res.json();
                const selects = [document.getElementById('date1'), document.getElementById('date2'), document.getElementById('date3')];

                history.forEach(rollup => {
                    const d = new Date(rollup.date);
                    const label = `${d.toLocaleDateString('en-GB')} (${rollup.day || d.toLocaleDateString('en-GB', { weekday: 'long' })})`;
                    selects.forEach(sel => {
                        const opt = document.createElement('option');
                        opt.value = rollup._id;
                        opt.textContent = label;
                        sel.appendChild(opt);
                    });
                });
            } catch (err) { console.error("Load error:", err); }
        }

    async function buildMultiColumnTable() {
    const id1 = document.getElementById('date1').value;
    const id2 = document.getElementById('date2').value;
    const id3 = document.getElementById('date3').value;
    
    const ids = [id1, id2, id3].filter(id => id !== "");
    if (ids.length === 0) return alert("Select at least one date.");

    try {
        let rollupData = [];
        for (const id of ids) {
            const response = await fetch(`/api/rollups/${id}`);
            const data = await response.json();
            rollupData.push(data);
        }

        // --- FIX 1: Sort by Date (Earliest to Latest) ---
        rollupData.sort((a, b) => new Date(a.date) - new Date(b.date));

        let html = `<div style="max-width: 650px; margin: 0 auto; font-family: Arial, sans-serif;">`;
        html += `<table id="emailTable" border="1" cellpadding="8" style="border-collapse: collapse; width: 100%; table-layout: fixed;">`;
        
        // --- HEADER ROW ---
        html += `<tr style="background-color: #2e7d32; color: white;">`;
        rollupData.forEach(rd => {
            const d = new Date(rd.date);
            html += `<th style="width: 33.33%; text-align: center; border: 1px solid #1b5e20; font-size: 0.9em; padding: 10px;">
                        ${d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' })}<br>
                        <span style="font-weight: normal; font-size: 0.8em; display: block; margin: 4px 0;">${rd.competition || "Social Play"}</span>
                        ${d.toLocaleDateString('en-GB', { weekday: 'long' })}
                     </th>`;
        });
        html += `</tr>`;

        // --- CONTENT ROW ---
        html += `<tr valign="top">`;
        rollupData.forEach(rd => {
            html += `<td style="width: 33.33%; padding: 10px; border: 1px solid #ccc; background-color: #ffffff; font-size: 0.85em;">`;
            
            // --- FIX 2: Filter out empty groups ---
            // Only show groups that actually have players (length > 0)
            const activeGroups = (rd.groups || []).filter(g => g.length > 0);

            if (activeGroups.length > 0) {
                activeGroups.forEach((group, gIdx) => {
                    html += `<div style="margin-bottom: 12px; border-bottom: 1px solid #eee; padding-bottom: 5px;">`;
                    html += `<b style="color: #2e7d32; font-size: 0.9em;">Grp ${gIdx + 1}</b><br>`;
                    
                    const playerList = group.map(p => {
                        return p.booker ? `<strong>${p.name}</strong>` : p.name;
                    }).join("<br>");
                    
                    html += `<span style="line-height: 1.4;">${playerList}</span>`;
                    html += `</div>`;
                });
            } else {
                html += `<em style="color:#999;">No groups</em>`;
            }
            html += `</td>`;
        });
        
        html += `</tr></table></div>`;

        document.getElementById('previewArea').innerHTML = html;
        document.getElementById('selectBtn').classList.remove('hidden');

    } catch (err) {
        console.error("Table Gen Error:", err);
        alert("Error generating table.");
    }
}

        // Helper to automatically highlight the table for the user
        function selectElementContents() {
            const el = document.getElementById("emailTable");
            const body = document.body;
            let range, sel;
            if (document.createRange && window.getSelection) {
                range = document.createRange();
                sel = window.getSelection();
                sel.removeAllRanges();
                try {
                    range.selectNodeContents(el);
                    sel.addRange(range);
                } catch (e) {
                    range.selectNode(el);
                    sel.addRange(range);
                }
            }
        }
    </script>
</body>

</html>
