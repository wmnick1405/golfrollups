<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Table Generator</title>
    <style>
        body {
            font-family: Arial;
            margin: 30px;
        }

        .controls {
            background: #f4f4f4;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #ddd;
        }

        select {
            padding: 8px;
            margin-right: 10px;
            flex: 1;
        }

        #previewArea {
            margin-top: 30px;
            padding: 20px;
            border: 2px dashed #2e7d32;
            border-radius: 8px;
            background-color: white;
            min-height: 100px;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            cursor: pointer;
            border-radius: 50px;
            font-weight: bold;
        }

        .btn-generate {
            background: #2e7d32;
            color: white;
            border-radius: 50px;
        }

        .btn-select {
            background: #1565c0;
            color: white;
            margin-top: 10px;
            border-radius: 50px;
        }

        .btn-reset {
            background: #757575;
            color: white;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .hidden {
            display: none;
        }
    </style>
</head>

<body>
    <div id="nav-placeholder"></div>

    <div class="controls">
        <h3>Step 1: Select up to 3 Dates</h3>
        <div style="display: flex; gap: 10px;">
            <select id="date1">
                <option value="">-- Select Date 1 --</option>
            </select>
            <select id="date2">
                <option value="">-- Select Date 2 --</option>
            </select>
            <select id="date3">
                <option value="">-- Select Date 3 --</option>
            </select>
        </div>

        <div class="button-group">
            <button class="btn btn-generate" onclick="buildMultiColumnTable()">Step 2: Generate Table Below</button>
            <button class="btn btn-reset" onclick="resetDropdowns()">Clear Selection</button>
        </div>
    </div>

    <div id="previewArea">
        <p style="color: #666;">Your generated table will appear here. Highlight and copy it directly into your email.
        </p>
    </div>

    <button id="selectBtn" class="btn btn-select hidden" onclick="selectElementContents()">
        Click to Highlight Table for Copying
    </button>

    <script src="js/shared.js"></script>

    <script>
        // Use addEventListener to prevent conflicts with the navbar script
        window.addEventListener('DOMContentLoaded', loadRollupHistory);

        async function loadRollupHistory() {
            try {
                const res = await fetch('/api/rollups?limit=20');
                const history = await res.json();
                const selects = [document.getElementById('date1'), document.getElementById('date2'), document.getElementById('date3')];

                history.forEach(rollup => {
                    const d = new Date(rollup.date);
                    const compSuffix = rollup.competition ? ` - ${rollup.competition}` : "";
                    const label = `${d.toLocaleDateString('en-GB')} (${rollup.day || d.toLocaleDateString('en-GB', { weekday: 'long' })}) ${compSuffix}`;

                    selects.forEach(sel => {
                        const opt = document.createElement('option');
                        opt.value = rollup._id;
                        opt.textContent = label;
                        sel.appendChild(opt);
                    });
                });
            } catch (err) { console.error("Load error:", err); }
        }

        async function buildMultiColumnTable() {
            const ids = [
                document.getElementById('date1').value,
                document.getElementById('date2').value,
                document.getElementById('date3').value
            ].filter(id => id !== "");

            if (ids.length === 0) return alert("Select at least one date.");

            try {
                let rollupData = [];
                for (const id of ids) {
                    const response = await fetch(`/api/rollups/${id}`);
                    rollupData.push(await response.json());
                }

                // SORT: Chronological (Earliest date on the left)
                rollupData.sort((a, b) => new Date(a.date) - new Date(b.date));

                let html = `<div style="max-width: 650px; margin: 0 auto; font-family: Arial, sans-serif;">`;
                html += `<table id="emailTable" border="1" cellpadding="8" style="border-collapse: collapse; width: 100%; table-layout: fixed;">`;

                // HEADER ROW
                // HEADER ROW
                html += `<tr style="background-color: #2e7d32; color: white;">`;
                rollupData.forEach(rd => {
                    const d = new Date(rd.date);
                    // Match the format from the Booking Sheet
                    const compDisplay = rd.competition ? `Competition: ${rd.competition}` : "Competition: Social";

                    html += `<th style="width: 33.33%; text-align: center; border: 1px solid #1b5e20; font-size: 0.9em; padding: 10px;">
                                ${d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' })}<br>
                                <span style="font-weight: normal; font-size: 0.8em; display: block; margin: 4px 0; border-top: 1px solid rgba(255,255,255,0.3); padding-top: 4px;">
                                    ${compDisplay}
                                </span>
                                ${d.toLocaleDateString('en-GB', { weekday: 'long' })}
                             </th>`;
                });
                html += `</tr>`;

                // --- CONTENT ROW ---
                html += `<tr valign="top">`;
                rollupData.forEach(rd => {
                    html += `<td style="width: 33.33%; padding: 10px; border: 1px solid #ccc; background-color: #ffffff; font-size: 0.85em;">`;

                    const activeGroups = (rd.groups || []).filter(g => g.length > 0);

                    if (activeGroups.length > 0) {
                        activeGroups.forEach((group, gIdx) => {
                            html += `<div style="margin-bottom: 15px; border-bottom: 1px solid #eee; padding-bottom: 5px;">`;
                            html += `<b style="color: #2e7d32; font-size: 0.9em;">Group ${gIdx + 1}</b><br>`;

                            // Iterate through players and check for booker status
                            const names = group.map((p, pIdx) => {
                                // Logic: Emphasize if p.booker is true 
                                // OR (as a safety fallback) if they are the first player in the group
                                const isLead = (p.booker === true || p.booker === "true" || pIdx === 0);

                                return isLead ? `<strong>${p.name}</strong>` : p.name;
                            }).join("<br>");

                            html += `<span style="line-height: 1.4;">${names}</span>`;
                            html += `</div>`;
                        });
                    } else {
                        html += `<em style="color:#999;">No groups</em>`;
                    }
                    html += `</td>`;
                });

                html += `</tr></table></div>`;

                document.getElementById('previewArea').innerHTML = html;
                document.getElementById('selectBtn').classList.remove('hidden');

            } catch (err) {
                console.error("Table Gen Error:", err);
                alert("Error generating table.");
            }
        }

        function resetDropdowns() {
            ['date1', 'date2', 'date3'].forEach(id => document.getElementById(id).value = "");
            document.getElementById('selectBtn').classList.add('hidden');
            document.getElementById('previewArea').innerHTML = `<p style="color: #666;">Selections cleared.</p>`;
        }

        function selectElementContents() {
            const el = document.getElementById("emailTable");
            const range = document.createRange();
            const sel = window.getSelection();
            sel.removeAllRanges();
            try {
                range.selectNodeContents(el);
                sel.addRange(range);
            } catch (e) {
                range.selectNode(el);
                sel.addRange(range);
            }
        }
    </script>
</body>

</html>
