<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Table Generator</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 20px; background-color: #f4f7f6; color: #333; }
        .container { max-width: 1100px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        
        .controls { background: #eef2f7; padding: 20px; border-radius: 8px; margin-bottom: 25px; border: 1px solid #d1d9e6; }
        .setup-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; margin-top: 15px; }
        
        select, input { padding: 10px; border-radius: 4px; border: 1px solid #ccc; width: 100%; box-sizing: border-box; }
        label { font-weight: bold; font-size: 0.85em; display: block; margin-bottom: 5px; color: #444; }

        .btn { padding: 12px 24px; border: none; cursor: pointer; border-radius: 50px; font-weight: bold; margin-top: 15px; transition: opacity 0.2s; }
        .btn-generate { background: #2e7d32; color: white; }
        .btn-copy { background: #007bff; color: white; }
        .btn-mail { background: #6c757d; color: white; }
        .btn:hover { opacity: 0.9; }
        
        #emailDraft { 
            margin-top: 30px; 
            padding: 25px; 
            border: 2px solid #007bff; 
            background: #fff; 
            min-height: 400px; 
            border-radius: 8px; 
            outline: none;
            overflow-x: auto;
        }
    </style>
</head>
<body>
    <div id="nav-placeholder"></div>

    <div class="container">
        <h1>Rollup Email Generator</h1>
        
        <div class="controls">
            <h3>Step 1: Select Your Data</h3>
            <div class="setup-grid">
                <div>
                    <label>Rollup Date 1:</label>
                    <select id="date1"><option value="">-- Select Date --</option></select>
                </div>
                <div>
                    <label>Rollup Date 2:</label>
                    <select id="date2"><option value="">-- Select Date --</option></select>
                </div>
                <div>
                    <label>Rollup Date 3:</label>
                    <select id="date3"><option value="">-- Select Date --</option></select>
                </div>
                <div>
                    <label>Grid Start Date:</label>
                    <input type="date" id="gridStart">
                </div>
                <div style="grid-column: span 2;">
                    <label>Email Subject Line:</label>
                    <input type="text" id="emailSubject" placeholder="e.g. Rollup Groups & Availability">
                </div>
            </div>
            <button class="btn btn-generate" onclick="generateEmailContent()">Generate Email Draft Below</button>
        </div>

        <div id="previewSection" style="display:none;">
            <p style="font-size: 0.9em; color: #666;"><strong>Step 2:</strong> Edit your message below, then copy.</p>
            <div id="emailDraft" contenteditable="true"></div>
            <div style="margin-top:20px;">
                <button class="btn btn-copy" onclick="copyToClipboard()">1. Copy for Email</button>
                <button class="btn btn-mail" onclick="openEmailClient()">2. Open Mail Client</button>
            </div>
        </div>
    </div>

    <script>
        window.addEventListener('DOMContentLoaded', () => {
            loadRollupHistory();
            document.getElementById('gridStart').valueAsDate = new Date();
        });

        async function loadRollupHistory() {
            try {
                const res = await fetch('/api/rollups?limit=20');
                const history = await res.json();
                const selects = [document.getElementById('date1'), document.getElementById('date2'), document.getElementById('date3')];
                history.forEach(rollup => {
                    const d = new Date(rollup.date);
                    const label = `${d.toLocaleDateString('en-GB')} (${d.toLocaleDateString('en-GB', { weekday: 'short' })})`;
                    selects.forEach(sel => {
                        const opt = document.createElement('option');
                        opt.value = rollup._id;
                        opt.textContent = label;
                        sel.appendChild(opt);
                    });
                });
            } catch (err) { console.error("History Load Error:", err); }
        }

        async function generateEmailContent() {
    const ids = [document.getElementById('date1').value, document.getElementById('date2').value, document.getElementById('date3').value].filter(id => id !== "");
    const gStart = document.getElementById('gridStart').value;

    if (ids.length === 0) return alert("Select at least one date.");

    try {
        const [golfersRes, awayRes, extraRes] = await Promise.all([
            fetch('/api/golfers'), 
            fetch('/api/unavailable/all'),
            fetch('/api/extra-availabilities')
        ]);
        
        const golfers = await golfersRes.json();
        const awayRecords = await awayRes.json();
        
        // Ensure extraRecords is an array to prevent "not a function" errors
        let extraRecords = await extraRes.json();
        if (!Array.isArray(extraRecords)) extraRecords = [];

        const dayNames = ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"];
        
        let rollupData = [];
        for (const id of ids) {
            const response = await fetch(`/api/rollups/${id}`);
            rollupData.push(await response.json());
        }
        rollupData.sort((a, b) => new Date(a.date) - new Date(b.date));

        let html = `<div style="font-family: Arial, sans-serif; font-size: 14px; color: #333;">`;
        html += `<p>Hi everyone,</p><p>[Type your message here...]</p>`;

        // --- ROLLUP TABLE ---
        html += `<div style="max-width: 500px;"><table border="1" cellpadding="6" style="border-collapse: collapse; width: 100%; margin-bottom: 25px; border: 1px solid #ccc;">`;
        html += `<tr style="background-color: #2e7d32; color: white;">`;
        rollupData.forEach(rd => {
            const d = new Date(rd.date);
            html += `<th style="text-align: center; border: 1px solid #1b5e20; font-size: 11px; padding: 5px;">${d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' })}<br>${d.toLocaleDateString('en-GB', { weekday: 'long' })}</th>`;
        });
        html += `</tr><tr valign="top">`;
        rollupData.forEach(rd => {
            html += `<td style="padding: 6px; border: 1px solid #ccc; font-size: 11px;">`;
            (rd.groups || []).filter(g => g.length > 0).forEach((group, gIdx) => {
                html += `<div style="margin-bottom: 8px;"><b style="color:#2e7d32;">Group ${gIdx + 1}</b><br>`;
                html += group.map((p, pIdx) => (p.booker || pIdx === 0) ? `<strong>${p.name}</strong>` : p.name).join("<br>") + `</div>`;
            });
            html += `</td>`;
        });
        html += `</tr></table></div>`;

        // --- 24-SESSION GRID (Mon/Wed/Fri Only) ---
                const sessions = [];
                let curr = new Date(gStart);
                curr.setHours(0,0,0,0);
                
                // Keep looking until we find 24 valid sessions
                while (sessions.length < 24) {
                    const day = curr.getDay(); // 1=Mon, 3=Wed, 5=Fri
                    if (day === 1 || day === 3 || day === 5) {
                        sessions.push(new Date(curr));
                    }
                    curr.setDate(curr.getDate() + 1);
                }

        html += `<h3 style="color: #444; border-bottom: 1px solid #ccc; padding-bottom: 5px; margin-top: 20px;">Availability Grid</h3>`;
        html += `<table border="1" cellpadding="2" style="border-collapse: collapse; font-size: 9px; border: 1px solid #999; width: 100%;">`;
        html += `<tr style="background-color: #444; color: #fff;"><th style="padding: 4px; text-align: left;">Golfer</th>`;
        sessions.forEach(d => html += `<th style="text-align: center;">${d.toLocaleDateString('en-GB', {day:'2-digit', month:'2-digit'})}</th>`);
        html += `</tr>`;
        
        golfers.forEach((g, idx) => {
            html += `<tr style="background-color: ${idx % 2 === 0 ? '#fff' : '#f2f2f2'};"><td style="padding: 3px; font-weight: bold;">${g.name}</td>`;
            sessions.forEach(sDate => {
                const sTime = sDate.getTime();
                const dayName = dayNames[sDate.getDay()];
                const isNormalDay = g.play_days?.includes(dayName);
                const isExtraDay = extraRecords.some(e => e.golfer_id === g._id && new Date(e.date).setHours(0,0,0,0) === sTime);

                if (!isNormalDay && !isExtraDay) {
                    html += `<td style="padding: 1px; background-color: #e0e0e0;"></td>`;
                } else {
                    const isAway = awayRecords.some(rec => {
                        const gId = rec.golfer_id?._id || rec.golfer_id;
                        if (gId.toString() !== g._id.toString()) return false;
                        const start = new Date(rec.date_from).setHours(0,0,0,0);
                        const end = rec.indefinite ? Infinity : new Date(rec.date_to).setHours(23,59,59,999);
                        return sTime >= start && sTime <= end;
                    });
                    html += `<td style="padding: 1px; text-align: center; border: 1px solid #999;">
                        <div style="background-color: ${isAway ? '#f44336' : '#4caf50'}; height: 10px; width: 100%;"></div>
                    </td>`;
                }
            });
            html += `</tr>`;
        });
        html += `</table><p>Regards,<br>Nick</p></div>`;

        document.getElementById('emailDraft').innerHTML = html;
        document.getElementById('previewSection').style.display = 'block';
    } catch (err) { 
        console.error("Generator Error:", err);
        alert("Generation failed. Check the console (F12) for details."); 
    }
}

        async function openEmailClient() {
            try {
                const res = await fetch('/api/golfer-emails');
                const emails = await res.json();
                const subject = encodeURIComponent(document.getElementById('emailSubject').value || "Golf Update");
                window.location.href = `mailto:${emails.join(';')}?subject=${subject}`;
            } catch (err) { alert("Could not fetch golfer emails."); }
        }

        function copyToClipboard() {
            const el = document.getElementById('emailDraft');
            const blob = new Blob([el.innerHTML], { type: "text/html" });
            const data = [new ClipboardItem({ ["text/html"]: blob })];
            navigator.clipboard.write(data).then(() => alert("Content copied! Paste into your email."));
        }

        
        // Load the navigation bar
        fetch('nav.html')
            .then(response => response.text())
            .then(data => { 
                document.getElementById('nav-placeholder').innerHTML = data; 
            });
    </script>
</body>
</html>
