<!DOCTYPE html>
<html>
<!-- Golfers Admin - This is the main page for managing golfer information and availability. -->
<head>
    <title>Golfers Admin</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body {
                font-family: Arial;
                /* background: #f2f2f2;> */
                background-image: url('./images/IMG_0376a.jpg');
                background-size: 100%;
                background-position: center;
                background-attachment: fixed;
                background-repeat: no-repeat;

                padding: 30px;
                margin: 0;
                padding: 30px;
        }

        .container {
            max-width: 1100px;
            margin: 40px auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
        }

        h2,
        h3 {
            color: black;
            margin-top: 0;
        }

        /* The Add Box using your grid/flex logic but with cleaner spacing */
        .add-box {
            background: #b2eab2;
            padding: 25px;
            border-radius: 8px;
            border: 1px solid #e0edec;
            margin-bottom: 30px;
        }

        .input-row {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: flex-end;
        }

        .field-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .field-group label {
            font-size: 12px;
            font-weight: bold;
            color: #666;
            margin-bottom: 2px;
        }

        input[type="text"],
        input[type="email"] {
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
        }

        /* Your specific Day Picker styling improved */
        #daysPicker {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            background: white;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 5px;
            height: 40px;
            /* Matching the height of your text inputs */
            align-items: center;
            box-sizing: border-box;
        }

        .checkbox-label {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9em;
            font-weight: 600;
            cursor: pointer;
        }

        /* Scoped Buttons */
        .container button {
            padding: 8px 16px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }

        /* Container for the buttons in the row to handle the gap */
        .action-buttons {
            display: flex;
            gap: 10px;
            /* This creates the consistent gap between Save and Delete */
            justify-content: flex-start;
        }

        /* Force both buttons to be the exact same size */
        .btn-save,
        .btn-delete {
            width: 80px;
            /* Adjust this width if you want them wider */
            text-align: center;
            padding: 8px 0 !important;
            /* Vertical padding only, width handles the rest */
            box-sizing: border-box;
            background: #2e7d32;
            color: white;
        }

        /* Ensure the 'Actions' column has enough room for both buttons + gap */
        th:last-child,
        td:last-child {
            min-width: 180px;
        }

        .btn-add {
            background: #2e7d32;
            color: white;
            padding: 12px 24px !important;
        }

        .btn-add:hover {
            background: #276c2a;
        }

        /* Table Styling */
        table {
            width: 100%;
            border-collapse: collapse;
            background: whitesmoke;
        }

        th {
            background-color: #2e7d32;
            color: white;
            padding: 12px;
            text-align: left;
            font-size: 14px;
        }

        td {
            padding: 12px;
            border-bottom: 1px solid #eee;
            font-size: 14px;
        }

        .td-input {
            padding: 6px;
            border: 1px solid transparent;
            border-radius: 3px;
            width: 90%;
        }

        .td-input:focus {
            border: 1px solid #2e7d32;
            background: #fff;
            outline: none;
        }

        .exempt-cell {
            text-align: center;
            width: 100px;
        }

        .exempt-wrapper {
            display: flex;
            align-items: center;
            height: 40px;
            margin-bottom: 0;
        }

        #msg {
            height: 20px;
            margin-bottom: 15px;
        }
    </style>
</head>

<body>
    <div id="nav-placeholder"></div>

    <div class="container">
        <h2>Golfers Admin</h2>

        <div class="add-box">
    <h3>Add New Golfer</h3>
    <div id="msg"></div>
    
    <div class="input-row">
        <div class="field-group" style="flex: 1.5;">
            <label>Name (Required)</label>
            <input type="text" id="newName" placeholder="Full Name" style="height: 40px; box-sizing: border-box; background-color: whitesmoke;">
        </div>

        <div class="field-group" style="flex: 1;">
            <label>Phone</label>
            <input type="text" id="newPhone" placeholder="Phone" style="height: 40px; box-sizing: border-box; background-color: whitesmoke;">
        </div>

        <div class="field-group" style="flex: 1.5;">
            <label>Email</label>
            <input type="email" id="newEmail" placeholder="Email" style="height: 40px; box-sizing: border-box; background-color: whitesmoke;">
        </div>
        
        <div class="field-group">
            <label>Default Play Days</label>
            <div id="daysPicker">
                <label class="checkbox-label"><input type="checkbox" class="day-opt" value="Monday"> Mon</label>
                <label class="checkbox-label"><input type="checkbox" class="day-opt" value="Wednesday"> Wed</label>
                <label class="checkbox-label"><input type="checkbox" class="day-opt" value="Friday"> Fri</label>
            </div>
        </div>

        <div class="exempt-wrapper">
            <label class="checkbox-label">
                <input type="checkbox" id="newExempt">
                <span>Booking Exempt</span>
            </label>
        </div>

        <button class="btn-add" onclick="addGolfer()" style="height: 40px;">Add Golfer</button>
    </div>
</div>

        <table id="golfersTable">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Phone</th>
                    <th>Email</th>
                    <th style="width: 180px;">Playing Days</th>
                    <th class="exempt-cell">Exempt</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <script>
        function showMsg(text, isError = false) {
            const msg = document.getElementById("msg");
            msg.textContent = text;
            msg.style.color = isError ? "#d32f2f" : "#2e7d32";
            msg.style.fontWeight = "bold";
            setTimeout(() => { msg.textContent = ""; }, 5000);
        }

        async function addGolfer() {
            const name = document.getElementById("newName").value.trim();
            const tel = document.getElementById("newPhone").value.trim();
            const email = document.getElementById("newEmail").value.trim();
            const booking_exempt = document.getElementById("newExempt").checked;
            const play_days = Array.from(document.querySelectorAll(".day-opt:checked")).map(cb => cb.value);

            if (!name) return showMsg("Error: Name is required", true);

            try {
                const res = await fetch("/api/golfers", {
                    method: "POST",
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, tel, email, play_days, booking_exempt })
                });

                if (res.ok) {
                    showMsg(`Success: ${name} added!`);
                    document.getElementById("newName").value = "";
                    document.getElementById("newPhone").value = "";
                    document.getElementById("newEmail").value = "";
                    document.getElementById("newExempt").checked = false;
                    document.querySelectorAll(".day-opt").forEach(cb => cb.checked = false);
                    loadGolfers();
                } else {
                    const data = await res.json();
                    showMsg("Error: " + (data.error || "Could not add"), true);
                }
            } catch (err) { showMsg("Connection failed", true); }
        }

        async function loadGolfers() {
            try {
                const res = await fetch('/api/golfers');
                const golfers = await res.json();
                const tbody = document.querySelector("#golfersTable tbody");
                tbody.innerHTML = "";

                const weekDays = ["Monday", "Wednesday", "Friday"];

                golfers.forEach(g => {
                    const row = document.createElement("tr");

                    let daysHtml = `<div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; font-size: 0.85em;">`;
                    weekDays.forEach(day => {
                        const checked = (g.play_days || []).includes(day) ? 'checked' : '';
                        daysHtml += `
                            <label style="cursor:pointer;">
                                <input type="checkbox" class="edit-day-${g._id}" value="${day}" ${checked}> ${day.substring(0, 3)}
                            </label>`;
                    });
                    daysHtml += `</div>`;

                    // Inside your loadGolfers() loop where the row.innerHTML is defined:
                    row.innerHTML = `
    <td><input type="text" class="td-input" value="${g.name}" id="name_${g._id}"></td>
    <td><input type="text" class="td-input" value="${g.tel || ''}" id="tel_${g._id}"></td>
    <td><input type="email" class="td-input" value="${g.email || ''}" id="email_${g._id}"></td>
    <td>${daysHtml}</td>
    <td class="exempt-cell">
        <input type="checkbox" id="exempt_${g._id}" ${g.booking_exempt ? 'checked' : ''}>
    </td>
    <td>
        <div class="action-buttons">
            <button class="btn-save" onclick="saveGolfer('${g._id}')">Save</button>
            <button class="btn-delete" onclick="deleteGolfer('${g._id}')">Delete</button>
        </div>
    </td>
`;
                    tbody.appendChild(row);
                });
            } catch (err) { console.error("Load failed", err); }
        }

        async function saveGolfer(id) {
            const payload = {
                name: document.getElementById("name_" + id).value.trim(),
                tel: document.getElementById("tel_" + id).value.trim(),
                email: document.getElementById("email_" + id).value.trim(),
                booking_exempt: document.getElementById("exempt_" + id).checked,
                play_days: Array.from(document.querySelectorAll(`.edit-day-${id}:checked`)).map(cb => cb.value)
            };

            if (!payload.name) return alert("Name cannot be empty");

            try {
                const res = await fetch("/api/golfers/" + id, {
                    method: "PUT",
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (res.ok) {
                    alert("Golfer updated!");
                    loadGolfers();
                }
            } catch (err) { alert("Server error"); }
        }

        async function deleteGolfer(id) {
            if (!confirm("Delete this golfer?")) return;
            await fetch("/api/golfers/" + id, { method: "DELETE" });
            loadGolfers();
        }

        loadGolfers();

        fetch('nav.html')
            .then(response => response.text())
            .then(data => { document.getElementById('nav-placeholder').innerHTML = data; });
    </script>
</body>

</html>
