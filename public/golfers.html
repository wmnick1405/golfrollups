<!DOCTYPE html>
<html>
<head>
    <title>Golfers Admin</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-image: url('./images/IMG_0376a.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            padding: 10px; /* Reduced for mobile */
            margin: 0;
        }

        .container {
            max-width: 1100px;
            margin: 20px auto;
            background: rgba(255, 255, 255, 0.95);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        }

        h2, h3 { color: #333; margin-top: 0; }

        /* Add Box - Flexible Layout */
        .add-box {
            background: #e8f5e9;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #c8e6c9;
            margin-bottom: 30px;
        }

        .input-row {
            display: flex;
            gap: 15px;
            flex-wrap: wrap; /* Allows stacking on mobile */
            align-items: flex-end;
        }

        .field-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
            flex: 1 1 200px; /* Grow/Shrink, base width 200px */
        }

        .field-group label {
            font-size: 12px;
            font-weight: bold;
            color: #555;
        }

        input[type="text"], input[type="email"] {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 16px; /* 16px prevents iOS zoom on focus */
            background: white;
        }

        #daysPicker {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            background: white;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 5px;
            height: 44px;
            align-items: center;
        }

        .checkbox-label {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            font-size: 0.85em;
            cursor: pointer;
        }

        /* Buttons */
        .container button {
            padding: 10px 20px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }

        .btn-add {
            background: #2e7d32;
            color: white;
            flex: 1 1 100%; /* Full width on mobile when wrapped */
            margin-top: 10px;
        }

        /* Table Responsiveness */
        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background-color: #2e7d32;
            color: white;
            padding: 12px;
            text-align: left;
        }

        td {
            padding: 12px;
            border-bottom: 1px solid #ddd;
            background: white;
        }

        .action-buttons {
            display: flex;
            gap: 8px;
        }

        .btn-save { background: #2e7d32; color: white; width: 80px;}
        .btn-delete { background: #d32f2f; color: white; width: 80px;}

        #msg { min-height: 20px; margin-bottom: 10px; }

        /* MOBILE STYLES */
        @media screen and (max-width: 768px) {
            body { padding: 5px; }
            .container { padding: 15px; margin: 10px auto; }
            
            /* Turn Table into Cards */
            table, thead, tbody, th, td, tr { 
                display: block; 
            }
            
            thead tr { 
                position: absolute;
                top: -9999px;
                left: -9999px;
            }
            
            tr { 
                border: 1px solid #ccc; 
                margin-bottom: 15px;
                border-radius: 8px;
                overflow: hidden;
                box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            }
            
            td { 
                border: none;
                border-bottom: 1px solid #eee; 
                position: relative;
                padding-left: 40%; /* Space for label */
                min-height: 40px;
            }
            
            /* Labels for mobile card fields */
            td:before { 
                position: absolute;
                left: 10px;
                width: 35%; 
                font-weight: bold;
                color: #2e7d32;
                content: attr(data-label); /* Pulls from HTML attribute */
            }

            .td-input { width: 100% !important; box-sizing: border-box; }
            .action-buttons { justify-content: flex-end; padding: 5px 0; }
        }
    </style>
</head>
<body>
    <div id="nav-placeholder"></div>

    <div class="container">
        <h2>Golfers Admin</h2>
        <div id="msg"></div>

        <div class="add-box">
            <h3>Add New Golfer</h3>
            <div class="input-row">
                <div class="field-group">
                    <label>Name</label>
                    <input type="text" id="newName" placeholder="Full Name">
                </div>
                <div class="field-group">
                    <label>Phone</label>
                    <input type="text" id="newPhone" placeholder="Phone">
                </div>
                <div class="field-group">
                    <label>Email</label>
                    <input type="email" id="newEmail" placeholder="Email">
                </div>
                <div class="field-group">
                    <label>Play Days</label>
                    <div id="daysPicker">
                        <label class="checkbox-label"><input type="checkbox" class="day-opt" value="Monday"> Mon</label>
                        <label class="checkbox-label"><input type="checkbox" class="day-opt" value="Wednesday"> Wed</label>
                        <label class="checkbox-label"><input type="checkbox" class="day-opt" value="Friday"> Fri</label>
                    </div>
                </div>
                <div class="field-group" style="flex: 0 1 auto; justify-content: center; padding-bottom: 10px;">
                    <label class="checkbox-label">
                        <input type="checkbox" id="newExempt"> <span>Exempt</span>
                    </label>
                </div>
                <button class="btn-add" onclick="addGolfer()">Add Golfer</button>
            </div>
        </div>

        <table id="golfersTable">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Phone</th>
                    <th>Email</th>
                    <th>Days</th>
                    <th>Exempt</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <script src="js/shared.js"></script>
    <script>
        // ... (Keep showMsg, addGolfer, saveGolfer, deleteGolfer functions exactly as they were) ...

        async function loadGolfers() {
            try {
                const res = await fetch('/api/golfers');
                const golfers = await res.json();
                const tbody = document.querySelector("#golfersTable tbody");
                tbody.innerHTML = "";
                const weekDays = ["Monday", "Wednesday", "Friday"];

                golfers.forEach(g => {
                    const row = document.createElement("tr");
                    
                    let daysHtml = `<div style="display: flex; gap: 8px; flex-wrap: wrap;">`;
                    weekDays.forEach(day => {
                        const checked = (g.play_days || []).includes(day) ? 'checked' : '';
                        daysHtml += `<label style="font-size:0.8em;"><input type="checkbox" class="edit-day-${g._id}" value="${day}" ${checked}> ${day.substring(0,3)}</label>`;
                    });
                    daysHtml += `</div>`;

                    // Added data-label for mobile view
                    row.innerHTML = `
                        <td data-label="Name"><input type="text" class="td-input" style="width:90%" value="${g.name}" id="name_${g._id}"></td>
                        <td data-label="Phone"><input type="text" class="td-input" style="width:90%" value="${g.tel || ''}" id="tel_${g._id}"></td>
                        <td data-label="Email"><input type="email" class="td-input" style="width:90%" value="${g.email || ''}" id="email_${g._id}"></td>
                        <td data-label="Days">${daysHtml}</td>
                        <td data-label="Exempt"><input type="checkbox" id="exempt_${g._id}" ${g.booking_exempt ? 'checked' : ''}></td>
                        <td data-label="Actions">
                            <div class="action-buttons">
                                <button class="btn-save" onclick="saveGolfer('${g._id}')">Save</button>
                                <button class="btn-delete" onclick="deleteGolfer('${g._id}')">Delete</button>
                            </div>
                        </td>
                    `;
                    tbody.appendChild(row);
                });
            } catch (err) { console.error("Load failed", err); }
        }
        // ... (Keep remaining script) ...
        loadGolfers();
    </script>
</body>
</html>
