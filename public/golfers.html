<!DOCTYPE html>
<html>
<div id="nav-placeholder"></div>

<head>
<title>Golfers Admin</title>

<style>
body{font-family:Arial;margin:40px}
table{border-collapse:collapse;width:100%}
th,td{border:1px solid #ccc;padding:8px}
button{padding:5px 10px}
</style>

</head>

<body>
    <div id="nav-placeholder"></div>

    <div style="max-width: 900px; margin: auto;">
        <h2>Golfers Admin</h2>
        
        <div style="background: #f0f4f8; padding: 20px; border-radius: 8px; border: 1px solid #d1d9e6; margin-bottom: 30px;">
            <h3>Add New Golfer</h3>
            <div id="msg" style="margin-bottom: 10px; font-weight: bold;"></div>
            <div style="display: flex; gap: 10px; flex-wrap: wrap;">
                <input type="text" id="newName" placeholder="Name (Required)" style="padding: 8px; flex: 1;">
                <input type="text" id="newPhone" placeholder="Phone" style="padding: 8px; flex: 1;">
                <input type="email" id="newEmail" placeholder="Email" style="padding: 8px; flex: 1;">
                <input type="text" id="newDays" placeholder="Days (e.g. Monday, Wednesday)" style="padding: 8px; flex: 1;">
                <button onclick="addGolfer()" style="background: #2e7d32; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer;">Add Golfer</button>
            </div>
            <small style="display: block; margin-top: 5px; color: #666;">Separate days with commas.</small>
        </div>

        <table id="golfersTable">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Phone</th>
                    <th>Email</th>
                    <th>Playing Days</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

<script>
    // Show feedback messages
    function showMsg(text, isError = false) {
        const msg = document.getElementById("msg");
        msg.textContent = text;
        msg.style.color = isError ? "#d32f2f" : "#2e7d32";
        setTimeout(() => { msg.textContent = ""; }, 5000);
    }

    async function addGolfer() {
        const name = document.getElementById("newName").value.trim();
        const phone = document.getElementById("newPhone").value.trim();
        const email = document.getElementById("newEmail").value.trim();
        const daysInput = document.getElementById("newDays").value;
        
        // --- VALIDATION ---
        if (!name) return showMsg("Error: Name is required", true);
        
        // Clean up the days array
        const play_days = daysInput.split(",").map(d => d.trim()).filter(d => d !== "");

        try {
            const res = await fetch("/api/golfers", {
                method: "POST",
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, phone, email, play_days })
            });

            const data = await res.json();

            if (res.ok) {
                showMsg(`Success: ${name} added!`);
                // Clear inputs
                document.getElementById("newName").value = "";
                document.getElementById("newPhone").value = "";
                document.getElementById("newEmail").value = "";
                document.getElementById("newDays").value = "";
                loadGolfers();
            } else {
                showMsg("Error: " + (data.error || "Could not add golfer"), true);
            }
        } catch (err) {
            showMsg("Server connection failed", true);
        }
    }

    async function loadGolfers() {
        try {
            const res = await fetch('/api/golfers');
            if (res.status === 401) { window.location.href = "/"; return; }
            
            const golfers = await res.json();
            const tbody = document.querySelector("#golfersTable tbody");
            tbody.innerHTML = "";

            golfers.forEach(g => {
                const row = document.createElement("tr");
                row.innerHTML = `
                    <td><input type="text" value="${g.name}" id="name_${g._id}"></td>
                    <td><input type="text" value="${g.phone || ''}" id="phone_${g._id}"></td>
                    <td><input type="email" value="${g.email || ''}" id="email_${g._id}"></td>
                    <td><input type="text" value="${(g.play_days || []).join(', ')}" id="days_${g._id}"></td>
                    <td>
                        <button onclick="saveGolfer('${g._id}')">Save</button>
                        <button onclick="deleteGolfer('${g._id}')" style="background:#ffcccc; color:#900; border:1px solid #900;">Delete</button>
                    </td>
                `;
                tbody.appendChild(row);
            });
        } catch (err) { console.error("Load failed", err); }
    }

    async function saveGolfer(id) {
        const name = document.getElementById("name_" + id).value.trim();
        const phone = document.getElementById("phone_" + id).value.trim();
        const email = document.getElementById("email_" + id).value.trim();
        const days = document.getElementById("days_" + id).value.split(",").map(d => d.trim());

        if (!name) return alert("Name cannot be empty");

        const res = await fetch("/api/golfers/" + id, {
            method: "PUT",
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name, phone, email, play_days: days })
        });

        if (res.ok) {
            alert("Golfer updated successfully");
            loadGolfers();
        } else {
            alert("Failed to update golfer");
        }
    }

    async function deleteGolfer(id) {
        if (!confirm("Delete this golfer?")) return;
        await fetch("/api/golfers/" + id, { method: "DELETE" });
        loadGolfers();
    }

    loadGolfers();

    fetch('nav.html')
        .then(response => response.text())
        .then(data => { document.getElementById('nav-placeholder').innerHTML = data; });
</script>
</body>
</html>
