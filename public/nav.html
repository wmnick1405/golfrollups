<style>
    .navbar {
        background: #2e7d32;
        color: white;
        padding: 0 20px;
        margin-bottom: 20px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        height: 60px;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    .nav-group {
        display: flex;
        align-items: center;
    }

    .nav-link,
    .dropbtn {
        color: white;
        text-decoration: none;
        margin-right: 10px;
        /* Increased from 5px */
        padding: 12px 18px;
        /* Increased padding */
        border-radius: 6px;
        transition: all 0.2s ease;
        font-size: 15px;
        cursor: pointer;
    }

    .nav-link:hover,
    .dropdown:hover .dropbtn {
        background: rgba(255, 255, 255, 0.15);
    }

    /* --- DROPDOWN LOGIC --- */
    .dropdown {
        position: relative;
        display: inline-block;
    }

    .dropdown-content {
        display: none;
        position: absolute;
        background-color: #ffffff;
        min-width: 220px;
        box-shadow: 0px 8px 16px rgba(0, 0, 0, 0.2);
        z-index: 1000;
        border-radius: 8px;
        top: 100%;
        /* Starts at the bottom of the nav bar */
        margin-top: 8px;
        /* Adds a 8px visual gap */
        /* SAFETY: This invisible "bridge" prevents the menu from 
       closing when the mouse moves over the gap */
        padding-top: 0;
        border-top: 8px solid transparent;
        background-clip: padding-box;

        overflow: hidden;
    }

    .dropdown-content a {
        color: #333;
        padding: 12px 16px;
        text-decoration: none;
        display: block;
        font-size: 14px;
        border-bottom: 1px solid #eee;
    }

    .dropdown-content a:last-child {
        border-bottom: none;
    }

    .dropdown-content a:hover {
        background-color: #f1f1f1;
        color: #2e7d32;
    }

    .dropdown:hover .dropdown-content {
        display: block;
    }

    /* PILL STYLE LOGOUT */
    .btn-logout {
        background: #d32f2f;
        color: white;
        border: none;
        padding: 8px 20px;
        border-radius: 50px;
        /* Pill Shape */
        font-weight: 600;
        cursor: pointer;
        transition: transform 0.1s;
    }

    .btn-logout:hover {
        background: #b71c1c;
        transform: scale(1.03);
    }
</style>

<div class="navbar">
    <div class="nav-group">
        <a href="index.html" class="nav-link" style="font-weight: bold;">Home</a>

<script>
    async function handleLogout() {
        if (!confirm("Are you sure you want to logout?")) return;
        const res = await fetch('/api/logout', { method: 'POST' });
        if (res.ok) {
            window.location.href = "/";
        }
    }
</script>
