<!DOCTYPE html>
<html>
<head>
    <title>Participation Report</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 30px; background-color: #f4f4f4; }
        .container { max-width: 900px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1); }
        .controls { background: #eef2f7; padding: 15px; border-radius: 5px; margin-bottom: 20px; border: 1px solid #d1d9e6; }
        button.print-btn { background: #2e7d32; color: white; border: none; font-weight: bold; margin-left: 10px; padding: 8px; border-radius: 4px; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; background: white; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background-color: #2e7d32; color: white; }
        tr:nth-child(even) { background-color: #f9f9f9; }

        .date-filter { display: flex; gap: 10px; align-items: center; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px solid #ccc; }
        .view-link { font-size: 0.85em; color: #0066cc; text-decoration: none; margin-left: 8px; font-weight: normal; }
        .view-link:hover { text-decoration: underline; }

        @media print {
            .controls, #nav-placeholder, .print-btn { display: none !important; }
            body { background: white; margin: 0; padding: 0; }
            .container { box-shadow: none; max-width: 100%; border: none; }
        }
    </style>
</head>

<body>
    <div id="nav-placeholder"></div>

    <div class="container">
        <h2>Participation and Booking Report</h2>

        <div class="controls">
            <div class="date-filter">
                <label><strong>Filter by Date:</strong></label>
                <input type="date" id="dateFrom">
                <label>to</label>
                <input type="date" id="dateTo">
                <label style="margin-left:15px;">
                    <input type="checkbox" id="ignoreDates" onchange="toggleDateInputs()"> All Dates
                </label>
                <button onclick="init()" style="margin-left: auto; background: #2e7d32; color: white; border: none; padding: 5px 15px; border-radius: 4px; cursor: pointer;">Refresh Report</button>
            </div>

            <div style="display: flex; gap: 20px; align-items: flex-start;">
                <div style="flex: 1;">
                    <label><strong>Select Players:</strong></label>
                    <div id="checkboxContainer" style="border: 1px solid #ccc; background: white; max-height: 150px; overflow-y: auto; padding: 10px; border-radius: 4px; margin-top: 5px;">
                        <label style="display: block; margin-bottom: 5px; font-weight: bold; border-bottom: 1px solid #eee; padding-bottom: 5px; cursor: pointer;">
                            <input type="checkbox" id="selectAll" onchange="toggleAllPlayers(this)"> -- Select All --
                        </label>
                        <div id="playerCheckboxList"></div>
                    </div>
                </div>
                <div style="padding-top: 25px;">
                    <button class="print-btn" onclick="window.print()">Save as PDF / Print</button>
                </div>
            </div>
        </div>

        <div id="reportContent">
            <table id="reportTable">
                <thead>
                    <tr>
                        <th onclick="sortTable('name')" style="cursor:pointer;">Player Name ↕</th>
                        <th onclick="sortTable('played')" style="cursor:pointer;">Times Played ↕</th>
                        <th onclick="sortTable('booked')" style="cursor:pointer;">Times Booked ↕</th>
                        <th onclick="sortTable('percentage')" style="cursor:pointer;">Booking % ↕</th>
                    </tr>
                </thead>
                <tbody id="reportTableBody"></tbody>
            </table>
        </div>
    </div>

    <script src="js/shared.js"></script>

    <script>
        let allStats = [];
        let sortDirection = 1;
        let currentSortCol = '';

        // Set default 'To' date to today
        document.getElementById('dateTo').valueAsDate = new Date();

        function toggleDateInputs() {
            const ignore = document.getElementById('ignoreDates').checked;
            document.getElementById('dateFrom').disabled = ignore;
            document.getElementById('dateTo').disabled = ignore;
            init(); 
        }

        async function init() {
            try {
                if (typeof checkLoginStatus === 'function') await checkLoginStatus();

                if (document.getElementById('playerCheckboxList').children.length === 0) {
                    await loadPlayers();
                }

                const from = document.getElementById('dateFrom').value;
                const to = document.getElementById('dateTo').value;
                const ignore = document.getElementById('ignoreDates').checked;

                let url = '/api/reports/participation';
                if (!ignore && (from || to)) {
                    url += `?from=${from}&to=${to}`;
                }

                const data = await apiFetch(url); 
                allStats = Array.isArray(data) ? data : [];
                generateReport();
            } catch (e) {
                console.error("Initialization failed:", e);
            }
        }

        async function loadPlayers() {
            const golfers = await apiFetch('/api/golfers');
            const list = document.getElementById('playerCheckboxList');
            list.innerHTML = "";
            golfers.forEach(g => {
                const label = document.createElement('label');
                label.style.display = "block";
                label.innerHTML = `<input type="checkbox" class="player-check" value="${g._id}" data-name="${g.name}" onchange="generateReport()"> ${g.name}`;
                list.appendChild(label);
            });
        }

        function sortTable(column) {
            if (currentSortCol === column) {
                sortDirection *= -1;
            } else {
                sortDirection = 1;
                currentSortCol = column;
            }

            allStats.sort((a, b) => {
                let valA, valB;
                if (column === 'name') {
                    valA = a.name.toLowerCase();
                    valB = b.name.toLowerCase();
                } else {
                    valA = parseFloat(a[column]);
                    valB = parseFloat(b[column]);
                }
                return (valA < valB ? -1 : valA > valB ? 1 : 0) * sortDirection;
            });
            generateReport();
        }

        function generateReport() {
            const tbody = document.getElementById('reportTableBody');
            const selectAll = document.getElementById('selectAll').checked;
            const checkedBoxes = document.querySelectorAll('.player-check:checked');
            const selectedNames = Array.from(checkedBoxes).map(cb => cb.getAttribute('data-name'));

            tbody.innerHTML = "";

            if (!selectAll && selectedNames.length === 0) {
                tbody.innerHTML = "<tr><td colspan='4' style='text-align:center;'>Select players above.</td></tr>";
                return;
            }

            const filtered = allStats.filter(item => selectAll || selectedNames.includes(item.name));

            const from = document.getElementById('dateFrom').value;
            const to = document.getElementById('dateTo').value;
            const ignore = document.getElementById('ignoreDates').checked;

            filtered.forEach(item => {
                const row = document.createElement("tr");
                const color = parseFloat(item.percentage) < 15 ? 'color: #d32f2f;' : 'color: #2e7d32;';
                
                let histUrl = `player-history.html?name=${encodeURIComponent(item.name)}`;
                if (!ignore) histUrl += `&from=${from}&to=${to}`;

                row.innerHTML = `
                    <td>
                        ${item.name} 
                        <a href="${histUrl}" class="view-link" style="font-size:0.8em; margin-left:10px; color:#0066cc;">(View Dates)</a>
                    </td>
                    <td>${item.played}</td>
                    <td>${item.booked}</td>
                    <td style="font-weight:bold; ${color}">${item.percentage}</td>
                `;
                tbody.appendChild(row);
            });
        }

        function toggleAllPlayers(master) {
            const checkboxes = document.querySelectorAll('.player-check');
            checkboxes.forEach(cb => cb.checked = master.checked);
            generateReport();
        }

        init();
    </script>
</body>
</html>
