<!DOCTYPE html>
<!
     This page generates a report of golfer participation and booking history. Admins can select specific players to include in the report, or select all players. 
     The report shows how many times each player has played in a rollup, how many times they have been the booker, and their overall booking percentage.
     Players with a booking percentage below 15% are highlighted in red to indicate low participation. 
     The report can be sorted by player name, times played, times booked, or booking percentage by clicking the column headers. 
     There is also a button to print or save the report as a PDF for sharing with players or for record-keeping.
>
<html>
<head>
    <title>Participation Report</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 30px; background-color: #f4f4f4; }
        .container { max-width: 900px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .controls { background: #eef2f7; padding: 15px; border-radius: 5px; margin-bottom: 20px; border: 1px solid #d1d9e6; }
        button.print-btn { background: #2e7d32; color: white; border: none; font-weight: bold; margin-left: 10px; padding: 8px; border-radius: 4px; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; background: white; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background-color: #2e7d32; color: white; }
        tr:nth-child(even) { background-color: #f9f9f9; }

        @media print {
            .controls, #nav-placeholder, .print-btn { display: none !important; }
            body { background: white; margin: 0; padding: 0; }
            .container { box-shadow: none; max-width: 100%; border: none; }
        }
    </style>
</head>
<body>
    <div id="nav-placeholder"></div>

    <div class="container">
        <h2>Participation and Booking Report</h2>
        
        <div class="controls">
            <div style="display: flex; gap: 20px; align-items: flex-start;">
                <div style="flex: 1;">
                    <label><strong>Select Players:</strong></label>
                    <div id="checkboxContainer" style="border: 1px solid #ccc; background: white; max-height: 150px; overflow-y: auto; padding: 10px; border-radius: 4px; margin-top: 5px;">
                        <label style="display: block; margin-bottom: 5px; font-weight: bold; border-bottom: 1px solid #eee; padding-bottom: 5px; cursor: pointer;">
                            <input type="checkbox" id="selectAll" onchange="toggleAllPlayers(this)"> -- Select All --
                        </label>
                        <div id="playerCheckboxList"></div>
                    </div>
                </div>
                <div style="padding-top: 25px;">
                    <button class="print-btn" onclick="window.print()">Save as PDF / Print</button>
                </div>
            </div>
            <p style="font-size: 0.8em; color: #666; margin-top: 10px;">
                Tip: Click column headers to sort. 
            </p>
        </div>

        <div id="reportContent">
            <table id="reportTable">
                <thead>
                    <tr>
                        <th onclick="sortTable('name')" style="cursor:pointer;">Player Name ↕</th>
                        <th onclick="sortTable('played')" style="cursor:pointer;">Times Played ↕</th>
                        <th onclick="sortTable('booked')" style="cursor:pointer;">Times Booked ↕</th>
                        <th onclick="sortTable('percentage')" style="cursor:pointer;">Booking % ↕</th>
                    </tr>
                </thead>
                <tbody id="reportTableBody"></tbody>
            </table>
        </div>
    </div>

<script>
    let allStats = [];
    let sortDirection = 1; 
    let currentSortCol = '';

    async function init() {
        try {
            await loadPlayers();
            const res = await fetch('/api/reports/participation');
            const data = await res.json();
            allStats = Array.isArray(data) ? data : [];
            generateReport();
        } catch (e) {
            console.error("Initialization failed:", e);
        }
    }

    async function loadPlayers() {
        const res = await fetch('/api/golfers');
        const golfers = await res.json();
        const list = document.getElementById('playerCheckboxList');
        list.innerHTML = "";
        golfers.forEach(g => {
            const label = document.createElement('label');
            label.style.display = "block";
            label.innerHTML = `<input type="checkbox" class="player-check" value="${g._id}" data-name="${g.name}" onchange="generateReport()"> ${g.name}`;
            list.appendChild(label);
        });
    }

    function toggleAllPlayers(master) {
        const checkboxes = document.querySelectorAll('.player-check');
        checkboxes.forEach(cb => cb.checked = master.checked);
        generateReport();
    }

    function sortTable(column) {
        if (currentSortCol === column) {
            sortDirection *= -1;
        } else {
            sortDirection = 1;
            currentSortCol = column;
        }

        allStats.sort((a, b) => {
            let valA, valB;
            if (column === 'name') {
                valA = a.name.toLowerCase();
                valB = b.name.toLowerCase();
            } else if (column === 'played') {
                valA = a.played;
                valB = b.played;
            } else if (column === 'booked') {
                valA = a.booked;
                valB = b.booked;
            } else if (column === 'percentage') {
                valA = parseFloat(a.percentage);
                valB = parseFloat(b.percentage);
            }
            return (valA < valB ? -1 : valA > valB ? 1 : 0) * sortDirection;
        });
        generateReport();
    } // <--- THIS WAS THE MISSING BRACE

    function generateReport() {
        const tbody = document.getElementById('reportTableBody');
        const selectAll = document.getElementById('selectAll').checked;
        const checkedBoxes = document.querySelectorAll('.player-check:checked');
        const selectedNames = Array.from(checkedBoxes).map(cb => cb.getAttribute('data-name'));

        tbody.innerHTML = "";

        if (!selectAll && selectedNames.length === 0) {
            tbody.innerHTML = "<tr><td colspan='4' style='text-align:center;'>Select players above.</td></tr>";
            return;
        }

        const filtered = allStats.filter(item => selectAll || selectedNames.includes(item.name));

        filtered.forEach(item => {
            const row = document.createElement("tr");
            const color = parseFloat(item.percentage) < 15 ? 'color: #d32f2f;' : 'color: #2e7d32;';
            row.innerHTML = `<td>${item.name}</td><td>${item.played}</td><td>${item.booked}</td><td style="font-weight:bold; ${color}">${item.percentage}</td>`;
            tbody.appendChild(row);
        });
    }

    // Initialize Navigation and Data
    fetch('nav.html')
        .then(response => response.text())
        .then(data => { document.getElementById('nav-placeholder').innerHTML = data; });

    init();
</script>
</body>
</html>
