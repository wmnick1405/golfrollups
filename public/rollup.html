<!DOCTYPE html>
<! This page allows admins to generate rollup groups for a specific date. Admins can select the date they want to generate for, and the system will automatically create balanced groups based on golfer availability and booking history.
The grouping algorithm first shuffles the available players to ensure randomness, then creates groups of 4 or 3 based on the total number of players. The player with the least booking history is assigned as the booker for each group, with an exemption for players marked as booking exempt. 
Once the groups are generated, they are displayed on the page and also saved to the database. 
Admins can then view the booking sheet for the generated rollup, which can be printed or saved as a PDF to share with players. 
If a rollup already exists for the selected date, the admin is alerted and given the option to view the existing booking sheet
 instead of generating a new rollup. This ensures that duplicate rollups are not created for the same date.>
>
<html>

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Golf Rollup Generator</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f4f7f6;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 500px;
            margin: 40px auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
        }

        h2 {
            color: #2c3e50;
            margin-top: 0;
            text-align: center;
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #555;
        }

        input[type="date"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 16px;
        }

        /* Scoped specifically to buttons inside .container to avoid nav bar issues */
        .container button {
            width: 100%;
            background: #2e7d32;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }

        .container button:hover {
            background: #256328;
        }

        #groups {
            margin-top: 25px;
        }

        .group {
            margin-bottom: 15px;
            padding: 15px;
            background: #ffffff;
            border: 1px solid #e0e0e0;
            border-left: 6px solid #2e7d32;
            border-radius: 8px;
            line-height: 1.6;
        }

        .booker-label {
            color: #2e7d32;
            font-weight: bold;
        }

        .exempt-label {
            color: #888;
            font-size: 0.85em;
            font-style: italic;
        }
    </style>
</head>

<body>
    <div id="nav-placeholder"></div>

    <div class="container">
        <h2>Rollup Generator</h2>
        
        <div class="input-group">
            <label for="date">Select Play Date</label>
            <input type="date" id="date">
        </div>

        <button onclick="generate()">Generate & Save Groups</button>
        
        <div id="groups"></div>
    </div>

    <script src="js/shared.js"></script>

    <script>
        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                let j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function buildGroups(players) {
            let total = players.length;
            if (total === 0) return [];
            
            if (total === 5) {
                return [players.splice(0, 3), players.splice(0, 2)];
            }

            let fours = 0, threes = 0;
            if (total % 4 === 0) fours = total / 4;
            else if (total % 4 === 3) { fours = Math.floor(total / 4); threes = 1; }
            else if (total % 4 === 2) { fours = Math.floor(total / 4) - 1; threes = 2; }
            else if (total % 4 === 1) { fours = Math.floor(total / 4) - 2; threes = 3; }

            let groups = [];
            for (let i = 0; i < fours; i++) groups.push(players.splice(0, 4));
            for (let i = 0; i < threes; i++) groups.push(players.splice(0, 3));
            if (players.length > 0) groups[groups.length - 1].push(...players);

            return groups;
        }

        function chooseBooker(group) {
            return group.sort((a, b) => {
                if (a.booking_count !== b.booking_count) return a.booking_count - b.booking_count;
                return new Date(a.last_booked) - new Date(b.last_booked);
            });
        }

        async function generate() {
            const dateInput = document.getElementById('date').value;
            if (!dateInput) return alert("Please select a date first");

            try {
                const checkRes = await fetch(`/api/rollups/find?date=${dateInput}`);
                if (checkRes.ok) {
                    const existing = await checkRes.json();
                    if (existing && existing._id) {
                        alert("A rollup already exists for this date.");
                        if (confirm("View existing booking sheet?")) {
                            window.location.href = "/bookingsheet.html?id=" + existing._id;
                        }
                        return;
                    }
                }

                const res = await fetch(`/api/available?date=${dateInput}`);
                if (res.status === 401) { window.location.href = "/"; return; }
                
                const players = await res.json();
                if (!players || players.length === 0) return alert("No players available for this day.");

                shuffle(players);
                const groups = buildGroups(players);
                
                const div = document.getElementById('groups');
                div.innerHTML = "";
                let saveGroups = [];

                for (let i = 0; i < groups.length; i++) {
                    let sortedGroup = chooseBooker(groups[i]);

                    // Exemption Swap Logic
                    if (sortedGroup[0].booking_exempt) {
                        const nonExemptIndex = sortedGroup.findIndex(p => !p.booking_exempt);
                        if (nonExemptIndex !== -1) {
                            [sortedGroup[0], sortedGroup[nonExemptIndex]] = [sortedGroup[nonExemptIndex], sortedGroup[0]];
                        }
                    }

                    const gDiv = document.createElement('div');
                    gDiv.className = "group";
                    let html = `<strong>Group ${i + 1}</strong><br>`;
                    let saveGroup = [];

                    sortedGroup.forEach((p, index) => {
                        const isBooker = (index === 0);
                        const tag = isBooker ? ' <span class="booker-label">(Booker)</span>' : 
                                    (p.booking_exempt ? ' <span class="exempt-label">(Exempt)</span>' : '');
                        
                        html += `${p.name}${tag}<br>`;
                        saveGroup.push({ golfer_id: p._id, name: p.name, booker: isBooker });
                    });

                    saveGroups.push(saveGroup);
                    gDiv.innerHTML = html;
                    div.appendChild(gDiv);
                }

                const saveRes = await fetch('/api/rollups', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ date: dateInput, groups: saveGroups })
                });
                
                const result = await saveRes.json();
                if (result.success) {
                    for (const group of saveGroups) {
                        const booker = group.find(p => p.booker === true);
                        if (booker) fetch("/api/booker/" + booker.golfer_id, { method: "POST" });
                    }
                    alert("Rollup generated and saved successfully!");
                }
            } catch (err) {
                console.error("Process Error:", err);
                alert("An error occurred during generation.");
            }
        }

    </script>
</body>
</html>
